version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gymflowtrack
      POSTGRES_PASSWORD: gymflowtrack
      POSTGRES_DB: gymflowtrack
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gymflowtrack"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=development
      - SUPER_ADMIN_PASSWORD=SuperAdmin@2026!
      - DEBUG=true
      - DATABASE_URL=postgresql+asyncpg://gymflowtrack:gymflowtrack@db:5432/gymflowtrack
      - DATABASE_URL_SYNC=postgresql://gymflowtrack:gymflowtrack@db:5432/gymflowtrack
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=test-secret-key-for-manual-testing-only-32chars!
      - RAZORPAY_KEY_ID=mock
      - COOKIE_SECURE=false
      - CORS_ORIGINS=http://localhost:3000
      - ALLOWED_HOSTS=*
      - WHATSAPP_PROVIDER=log_only
      - LOG_LEVEL=INFO
      - RATE_LIMIT_AUTH=99999
      - RATE_LIMIT_API=99999
    command: sh -c "alembic upgrade head && python -m app.scripts.seed_super_admin && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2 --limit-max-requests 10000 --timeout-graceful-shutdown 30 --access-log --proxy-headers --forwarded-allow-ips '*'"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=/api/v1
        - BACKEND_INTERNAL_URL=http://backend:8000
    ports:
      - "3000:3000"
    environment:
      - BACKEND_INTERNAL_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s
