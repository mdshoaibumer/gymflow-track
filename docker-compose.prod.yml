# ==============================================================
# GymFlow Track — Production Docker Compose
# ==============================================================
# Target: Hetzner CAX11 ARM64 VPS / Ubuntu 24.04
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# Prerequisites:
#   1. Copy .env.production and fill in real secrets
#   2. Point DNS (Cloudflare) A records to the VPS IP:
#      - app.gymflowtrack.in
#      - admin.gymflowtrack.in
#      - api.gymflowtrack.in
#   3. Build & start: docker compose -f docker-compose.prod.yml up -d --build
#   4. Run migrations: docker compose -f docker-compose.prod.yml exec backend alembic upgrade head
#
# Architecture:
#   Internet → Cloudflare → Caddy (auto HTTPS) → Docker internal network
#   ├── Frontend  (Next.js standalone)
#   ├── Backend   (FastAPI / Uvicorn)
#   ├── PostgreSQL (internal only)
#   └── Redis      (internal only)
# ==============================================================

services:
  # ── Caddy Reverse Proxy ────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 (QUIC)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data        # TLS certificates
      - caddy_config:/config
    networks:
      - web
      - internal
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M

  # ── PostgreSQL ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gymflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-gymflow}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gymflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    # NOT exposed to host — only reachable within Docker internal network
    deploy:
      resources:
        limits:
          memory: 512M
    # Tuning for CAX11 (4GB RAM shared). Conservative but effective.
    command: >
      postgres
        -c shared_buffers=128MB
        -c effective_cache_size=512MB
        -c work_mem=4MB
        -c maintenance_work_mem=64MB
        -c max_connections=50
        -c log_min_duration_statement=500
        -c log_statement=none

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
        --maxmemory 64mb
        --maxmemory-policy allkeys-lru
        --appendonly yes
        --save 60 1000
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 128M

  # ── Backend API ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - APP_ENV=production
      - DEBUG=false
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-gymflow}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-gymflow}
      - DATABASE_URL_SYNC=postgresql://${POSTGRES_USER:-gymflow}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-gymflow}
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?Set JWT_SECRET_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://app.gymflowtrack.in,https://admin.gymflowtrack.in}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-api.gymflowtrack.in}
      - COOKIE_SECURE=true
      - COOKIE_DOMAIN=${COOKIE_DOMAIN:-.gymflowtrack.in}
      - WHATSAPP_PROVIDER=${WHATSAPP_PROVIDER:-log_only}
      - WHATSAPP_API_KEY=${WHATSAPP_API_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DB_POOL_SIZE=${DB_POOL_SIZE:-5}
      - DB_MAX_OVERFLOW=${DB_MAX_OVERFLOW:-10}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID:?Set RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET:?Set RAZORPAY_KEY_SECRET}
      - RAZORPAY_WEBHOOK_SECRET=${RAZORPAY_WEBHOOK_SECRET:-}
      - TRUST_PROXY_HEADERS=true
      - SENTRY_DSN=${SENTRY_DSN:-}
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Frontend ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://api.gymflowtrack.in/api/v1}
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 256M

# ── Networks ───────────────────────────────────────────────
networks:
  web:
    driver: bridge
  internal:
    driver: bridge
    internal: true   # No outbound internet access for DB/Redis

# ── Volumes ────────────────────────────────────────────────
volumes:
  pgdata:
  redisdata:
  caddy_data:
  caddy_config:
