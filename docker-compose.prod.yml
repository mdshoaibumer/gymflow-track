# ==============================================================
# GymFlow Track — Production Docker Compose (Enterprise Grade)
# ==============================================================
# Target: Hetzner CAX11 ARM64 VPS / Ubuntu 24.04 / 4GB RAM
#
# Memory Budget (4GB total, ~3.5GB usable):
#   OS + Docker Engine:  ~500MB
#   PostgreSQL:          ~600MB (shared_buffers=256MB + overhead)
#   Backend (2 workers): ~400MB
#   Frontend:            ~200MB
#   Redis:               ~80MB
#   Caddy:               ~50MB
#   Monitoring Stack:    ~400MB (Prometheus + Grafana + Loki)
#   Buffer:              ~270MB
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml -f docker-compose.monitoring.yml up -d
#
# Prerequisites:
#   1. Copy .env.production to .env and fill in secrets
#   2. DNS A records pointing to VPS IP
#   3. Run: docker compose -f docker-compose.prod.yml up -d --build
#   4. Migrate: docker compose -f docker-compose.prod.yml exec backend alembic upgrade head
# ==============================================================

services:
  # ── Caddy Reverse Proxy ────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"          # HTTP/3 (QUIC)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data       # TLS certificates
      - caddy_config:/config
    networks:
      - web
      - internal
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"
    # Security: minimal capabilities
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE       # Bind to ports 80/443
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.gymflowtrack.service=caddy"
      - "com.gymflowtrack.tier=proxy"

  # ── PostgreSQL ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gymflowtrack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-gymflowtrack}
      LANG: en_US.utf8
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gymflowtrack} -d ${POSTGRES_DB:-gymflowtrack}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 640M
          cpus: "1.0"
    # Security
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 60s       # Allow time for clean shutdown + WAL flush
    # Tuning for CAX11 ARM64 (4GB RAM shared)
    command: >
      postgres
        -c shared_buffers=256MB
        -c effective_cache_size=1GB
        -c work_mem=8MB
        -c maintenance_work_mem=128MB
        -c max_connections=50
        -c wal_buffers=16MB
        -c checkpoint_completion_target=0.9
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c min_wal_size=80MB
        -c max_wal_size=1GB
        -c log_min_duration_statement=500
        -c log_checkpoints=on
        -c log_connections=on
        -c log_disconnections=on
        -c log_lock_waits=on
        -c log_temp_files=0
        -c log_statement=ddl
        -c idle_in_transaction_session_timeout=60000
        -c statement_timeout=30000
        -c shared_preload_libraries=pg_stat_statements
        -c pg_stat_statements.track=all
        -c jit=off
    shm_size: 256mb
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    labels:
      - "com.gymflowtrack.service=postgres"
      - "com.gymflowtrack.tier=data"

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
        --maxmemory 64mb
        --maxmemory-policy allkeys-lru
        --appendonly no
        --appendfsync everysec
        --save 900 1
        --save 300 10
        --save 60 10000
        --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD}
        --rename-command FLUSHALL ""
        --rename-command FLUSHDB ""
        --rename-command DEBUG ""
        --tcp-backlog 511
        --timeout 300
        --tcp-keepalive 60
    volumes:
      - redisdata:/data
    healthcheck:
      # Use REDISCLI_AUTH env var instead of -a flag to avoid exposing
      # the password in docker inspect output and process listing.
      test: ["CMD-SHELL", "REDISCLI_AUTH=$REDIS_PASSWORD redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 96M
          cpus: "0.25"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=10M
    stop_grace_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    labels:
      - "com.gymflowtrack.service=redis"
      - "com.gymflowtrack.tier=cache"

  # ── Backend API ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: gymflowtrack-backend:latest
    restart: unless-stopped
    environment:
      - APP_ENV=production
      - DEBUG=false
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-gymflowtrack}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-gymflowtrack}
      - DATABASE_URL_SYNC=postgresql://${POSTGRES_USER:-gymflowtrack}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-gymflowtrack}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?Set JWT_SECRET_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://app.gymflowtrack.in,https://admin.gymflowtrack.in}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-api.gymflowtrack.in}
      - COOKIE_SECURE=true
      - COOKIE_DOMAIN=${COOKIE_DOMAIN:-.gymflowtrack.in}
      - WHATSAPP_PROVIDER=${WHATSAPP_PROVIDER:-log_only}
      - WHATSAPP_API_KEY=${WHATSAPP_API_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DB_POOL_SIZE=${DB_POOL_SIZE:-5}
      - DB_MAX_OVERFLOW=${DB_MAX_OVERFLOW:-10}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID:?Set RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET:?Set RAZORPAY_KEY_SECRET}
      - RAZORPAY_WEBHOOK_SECRET=${RAZORPAY_WEBHOOK_SECRET:-}
      - TRUST_PROXY_HEADERS=true
      - SENTRY_DSN=${SENTRY_DSN:-}
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "2.0"
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp/gymflowtrack:size=50M     # Temp files for CSV processing
      - /tmp:size=10M                  # Required for curl healthcheck
    volumes:
      - uploads:/app/uploads            # Persistent storage for member photos
    stop_grace_period: 35s         # > uvicorn's 30s graceful shutdown
    logging:
      driver: json-file
      options:
        max-size: "25m"
        max-file: "5"
    labels:
      - "com.gymflowtrack.service=backend"
      - "com.gymflowtrack.tier=app"

  # ── Frontend ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://api.gymflowtrack.in/api/v1}
    image: gymflowtrack-frontend:latest
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 200M
          cpus: "0.5"
        reservations:
          memory: 100M
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=20M
    stop_grace_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.gymflowtrack.service=frontend"
      - "com.gymflowtrack.tier=app"

# ── Networks ───────────────────────────────────────────────
networks:
  web:
    driver: bridge
  internal:
    driver: bridge
    internal: true               # No outbound internet access for DB/Redis

# ── Volumes ────────────────────────────────────────────────
volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  uploads:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
