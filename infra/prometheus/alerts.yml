# ==============================================================
# Prometheus Alert Rules — GymFlow Track
# ==============================================================
# Actionable alerts for production operations.
# Severity levels: critical (page), warning (ticket), info (log)
# ==============================================================

groups:
  - name: gymflow_infrastructure
    rules:
      # ── VPS Resources ────────────────────────────────────────
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "CPU usage above 85% for 10 minutes"
          description: "CPU: {{ $value | printf \"%.1f\" }}%. Check for runaway processes or scale up."

      - alert: HighMemoryUsage
        expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 90
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Memory usage above 90%"
          description: "Available: {{ with printf \"node_memory_MemAvailable_bytes\" }}{{ . | humanize1024 }}{{ end }}. OOM kill risk."

      - alert: DiskSpaceLow
        expr: (1 - node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disk usage above 85%"
          description: "Disk: {{ $value | printf \"%.1f\" }}% full. Clean old backups/images."

      - alert: DiskSpaceCritical
        expr: (1 - node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 > 95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Disk usage above 95% — CRITICAL"
          description: "Immediate action needed. System may become read-only."

  - name: gymflow_application
    rules:
      # ── API Health ───────────────────────────────────────────
      - alert: BackendDown
        expr: up{job="gymflow-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Backend API is unreachable"
          description: "Prometheus cannot scrape the backend. Check container status."

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "HTTP 5xx error rate above 5%"
          description: "Error rate: {{ $value | printf \"%.2f\" }}. Check backend logs."

      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P95 latency above 2 seconds"
          description: "P95: {{ $value | printf \"%.2f\" }}s. Check slow queries or resource contention."

      - alert: HighRequestRate
        expr: rate(http_requests_total[1m]) > 100
        for: 5m
        labels:
          severity: info
        annotations:
          summary: "Sustained high request rate"
          description: "{{ $value | printf \"%.0f\" }} req/s for 5 minutes. Monitor for capacity."

  - name: gymflow_database
    rules:
      - alert: PostgreSQLDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is down"
          description: "Database unreachable. All API requests will fail."

      - alert: PostgreSQLConnectionsHigh
        expr: pg_stat_activity_count > 40
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL connections above 40/50"
          description: "{{ $value }} active connections. Risk of connection exhaustion."

  - name: gymflow_containers
    rules:
      - alert: ContainerRestarting
        expr: increase(container_restart_count[1h]) > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container restarting frequently"
          description: "{{ $labels.name }} restarted {{ $value }} times in 1 hour."

      - alert: ContainerOOMKilled
        expr: container_oom_events_total > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Container OOM killed"
          description: "{{ $labels.name }} was killed by OOM. Increase memory limit."
