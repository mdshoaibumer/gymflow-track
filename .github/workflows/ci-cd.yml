# ==============================================================
# GymFlow Track — CI/CD Pipeline
# ==============================================================
# Triggers:
#   - Push to main → full pipeline + deploy
#   - Pull request → test + build (no deploy)
#   - Manual dispatch → deploy with optional rollback
#
# Jobs:
#   1. Lint & type check
#   2. Backend tests
#   3. Frontend tests
#   4. Security scanning
#   5. Docker build validation
#   6. Deploy to production (main branch only)
# ==============================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - rollback

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '22'
  DOCKER_BUILDKIT: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Backend Lint & Tests ───────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gymflow
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: gymflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gymflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          cd backend
          ruff check . --output-format=github

      - name: Run tests with coverage
        env:
          APP_ENV: development
          DATABASE_URL: postgresql+asyncpg://gymflow:testpassword@localhost:5432/gymflow_test
          DATABASE_URL_SYNC: postgresql://gymflow:testpassword@localhost:5432/gymflow_test
          JWT_SECRET_KEY: test-secret-key-minimum-32-characters-long
          RAZORPAY_KEY_ID: mock
          RAZORPAY_KEY_SECRET: mock
        run: |
          cd backend
          pytest tests/ -v --tb=short -x --timeout=60 \
            --cov=app --cov-report=term-missing --cov-report=xml:coverage.xml \
            --cov-fail-under=45

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 30

  # ── Frontend Lint & Build ──────────────────────────────────
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci --ignore-scripts --no-audit

      - name: Lint
        run: |
          cd frontend
          npm run lint

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: https://api.gymflowtrack.in/api/v1
        run: |
          cd frontend
          npm run build

  # ── Security Scanning ──────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@v5

      - name: Run Trivy vulnerability scanner (backend)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'backend/'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          format: 'table'
          ignore-unfixed: true
        continue-on-error: true

      - name: Run Trivy vulnerability scanner (frontend)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'frontend/'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          format: 'table'
          ignore-unfixed: true
        continue-on-error: true

      - name: Check for secrets in code
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
        continue-on-error: true

  # ── Docker Build Validation ────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          load: true
          tags: gymflow-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          load: true
          tags: gymflow-frontend:test
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.gymflowtrack.in/api/v1
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'gymflow-backend:test'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'        # Don't fail, just report
          format: 'table'

      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'gymflow-frontend:test'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          format: 'table'

  # ── Deploy to Production ───────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test, docker-build, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script_stop: true
          script: |
            cd /opt/gymflow
            git fetch origin main
            git checkout main
            git pull origin main
            ./scripts/deploy.sh 2>&1 | tail -50

      - name: Verify deployment health
        run: |
          sleep 15
          HTTP_STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            https://api.gymflowtrack.in/health || echo "000")
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "Deployment healthy (HTTP $HTTP_STATUS)"
          else
            echo "WARNING: Health check returned HTTP $HTTP_STATUS"
            exit 1
          fi

      - name: Notify deployment
        if: always()
        run: |
          echo "Deployment ${{ job.status }} at $(date)"
          echo "Commit: ${{ github.sha }}"

  # ── Manual Rollback ────────────────────────────────────────
  rollback:
    name: Rollback Production
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'rollback'
    environment: production

    steps:
      - name: Rollback via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script: |
            cd /opt/gymflow
            echo "yes" | ./scripts/rollback.sh

      - name: Verify rollback health
        run: |
          sleep 15
          curl -sf --max-time 10 https://api.gymflowtrack.in/health | python3 -m json.tool || echo "Health check pending"
